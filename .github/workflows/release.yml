name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile --os '*' --cpu '*'

      - name: Run tests
        run: bun test

      - name: Run typecheck
        run: bun run typecheck

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/darwin-arm64 dist/darwin-x64 dist/linux-arm64 dist/linux-x64 dist/windows-x64

          bun build --compile --target=bun-darwin-arm64 --outfile dist/darwin-arm64/ctx.bin ./src/index.ts
          bun build --compile --target=bun-darwin-x64 --outfile dist/darwin-x64/ctx.bin ./src/index.ts
          bun build --compile --target=bun-linux-arm64 --outfile dist/linux-arm64/ctx.bin ./src/index.ts
          bun build --compile --target=bun-linux-x64 --outfile dist/linux-x64/ctx.bin ./src/index.ts
          bun build --compile --target=bun-windows-x64 --outfile dist/windows-x64/ctx.exe ./src/index.ts

          # Copy native libraries
          cp node_modules/onnxruntime-node/bin/napi-v3/darwin/arm64/libonnxruntime.1.21.0.dylib dist/darwin-arm64/
          cp node_modules/onnxruntime-node/bin/napi-v3/darwin/x64/libonnxruntime.1.21.0.dylib  dist/darwin-x64/
          find node_modules/onnxruntime-node/bin/napi-v3/linux/arm64/ -name "lib*" -exec cp {} dist/linux-arm64/ \;
          find node_modules/onnxruntime-node/bin/napi-v3/linux/x64/  -name "lib*" -exec cp {} dist/linux-x64/ \;

          # Create wrapper scripts for unix targets
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            cat > "dist/${platform}/ctx" << 'WRAPPER'
          #!/usr/bin/env bash
          SELF_DIR="$(cd "$(dirname "$0")" && pwd)"
          export DYLD_LIBRARY_PATH="$SELF_DIR:${DYLD_LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="$SELF_DIR:${LD_LIBRARY_PATH:-}"
          exec "$SELF_DIR/ctx.bin" "$@"
          WRAPPER
            chmod +x "dist/${platform}/ctx"
          done

      - name: Update latest tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          for target_dir in dist/*; do
            [ -d "$target_dir" ] || continue
            target="$(basename "$target_dir")"

            if [ -f "$target_dir/ctx.exe" ]; then
              asset_name="ctx-${target}.zip"
              (
                cd "$target_dir"
                zip -q "../../release/${asset_name}" ctx.exe
              )
            elif [ -f "$target_dir/ctx" ]; then
              asset_name="ctx-${target}.tar.gz"
              (
                cd "$target_dir"
                tar -czf "../../release/${asset_name}" .
              )
            else
              echo "No expected binary found in ${target_dir}" >&2
              exit 1
            fi
          done

          (
            cd release
            sha256sum * > checksums.txt
          )

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          files: |
            release/*
          overwrite_files: true
          make_latest: true
