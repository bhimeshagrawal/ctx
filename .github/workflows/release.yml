name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: ctx-darwin-arm64.tar.gz
            binary: ctx
          - os: ubuntu-latest
            artifact: ctx-linux-x64.tar.gz
            binary: ctx
          - os: windows-latest
            artifact: ctx-windows-x64.zip
            binary: ctx.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-msvc' || matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-unknown-linux-gnu' }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp target/release/ctx .
          tar -czf "release/${{ matrix.artifact }}" ctx

      - name: Package windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path target/release/ctx.exe -DestinationPath "release/${{ matrix.artifact }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten assets
        shell: bash
        run: |
          set -euo pipefail
          find release -type f -mindepth 2 -exec mv {} release/ \;
          find release -mindepth 1 -type d -empty -delete

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Update latest tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          files: |
            release/*
          overwrite_files: true
          make_latest: true
